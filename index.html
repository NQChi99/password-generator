<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Stack+Sans+Headline:wght@200..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=content_copy,lock,subdirectory_arrow_right" />
</head>

<body>
    <main>
        <span class="material-symbols-outlined icon_lock">
            lock
        </span>
        <h1>Password Generator</h1>
        <h2>Need a Password? Generate it in seconds here!</h2>
        <section>
            <span class="material-symbols-outlined icon_arrow">
                subdirectory_arrow_right
            </span>

            <label for="password_output"></label>
            <input type="text" id="password_output" size="50">

            <label for="copy"></label>
            <button id="copy">
                <span class="material-symbols-outlined icon_copy">
                    content_copy
                </span> Copy Password
            </button>
        </section>

        <section>
            <form>
                <div class="form_password">
                    <label>Password length: <span id="passwordLength">26</span></label>
                    <input type="range" min="1" max="50" id="range">
                </div>

                <label>Characters used:
                    <div class="characters_group">
                        <label for="uppercase"><input type="checkbox" id="uppercase" checked> Uppercase</label>

                        <label for="lowercase"><input type="checkbox" id="lowercase" checked> Lowercase</label>

                        <label for="numbers"><input type="checkbox" id="numbers" checked> Numbers</label>

                        <label for="symbols"><input type="checkbox" id="symbols" checked> Symbols</label>
                    </div>
                </label>

                <label for="generate"></label>
                <input type="submit" id="generate" value="Generate">
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
